<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos | Leones Tibás</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .swiper { width: 100%; height: 500px; border-radius: 20px; }
        .swiper-button-next, .swiper-button-prev { background: rgba(0,0,0,0.3); padding: 30px 20px; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto">
            <a href="home.html" class="text-blue-900 font-bold hover:text-blue-600 transition">
                <i class="fas fa-arrow-left mr-2"></i>Volver al Inicio
            </a>
        </div>
    </nav>

    <main class="container mx-auto py-12 px-6">
        <h2 class="text-4xl font-bold text-center text-blue-900 mb-12">Nuestro Álbum de Servicio</h2>

        <div class="relative max-w-4xl mx-auto">
            <div class="absolute -left-10 top-0 bottom-0 w-2 bg-yellow-400 rounded-full hidden md:block"></div>
            <div class="absolute -right-10 top-0 bottom-0 w-2 bg-yellow-400 rounded-full hidden md:block"></div>

            <div class="swiper mySwiper w-full h-[500px] rounded-3xl shadow-2xl overflow-hidden border-4 border-white bg-blue-900">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="source/images/1.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="source/images/2.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="source/images/3.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="source/images/4.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="source/images/5.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="source/images/6.jpeg" class="w-full h-full object-cover"></div>
                </div>
                
                <div class="swiper-button-next !text-yellow-400"></div>
                <div class="swiper-button-prev !text-yellow-400"></div>
                <div class="swiper-pagination !bottom-4"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            spaceBetween: 30,
            centeredSlides: true,
            loop: true,
            autoplay: { delay: 3500, disableOnInteraction: false },
            pagination: { el: ".swiper-pagination", clickable: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        });
    </script>
</body>
</html>
